name: Feature / experiment request
description: Suggest a new experiment, feature, or improvement.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve, or what question would it answer?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What change or experiment do you want to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why this one wins.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Pipeline / trainer change
        - New experiment / baseline
        - Evaluation / benchmark
        - Documentation
        - Tooling / CI
    validations:
      required: true
